<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>World Cup Penalty Shootout</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Oswald:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    background: #000;
    font-family: 'Oswald', sans-serif;
  }

  #game {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: #000;
  }

  /* ── BACKGROUND ── */
  .bg {
    position: absolute;
    top: -8%;
    left: 0;
    right: 0;
    bottom: 5%;
    background: url('background3.png') center bottom / cover no-repeat;
  }

  .bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 60%, rgba(0,10,0,0.3) 100%);
  }

  /* ── PITCH GROUP (anchors goal to grass line) ── */
  .pitch-group {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 32%;
    width: 100%;
    max-width: 540px;
  }

  /* ── GOAL NET IMAGE ── */
  .goal-area {
    position: relative;
    width: 100%;
    aspect-ratio: 2.2;
  }

  .goal-img {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .goal-img img {
    width: 100%;
    height: 100%;
    object-fit: fill;
  }

  /* ── ANSWER ZONES (4 corners) ── */
  .answers-container {
    position: absolute;
    inset: 6% 4% 6% 4%;
    z-index: 10;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 4px;
    padding: 0;
  }

  .answer-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4px 6px;
    font-family: 'Oswald', sans-serif;
    font-size: clamp(12px, 3vw, 17px);
    font-weight: 700;
    color: #fff;
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(1px);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.12s;
    text-shadow: 0 2px 4px rgba(0,0,0,0.9);
    line-height: 1.1;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    z-index: 12;
  }

  .answer-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
    border-radius: 10px 10px 0 0;
    pointer-events: none;
  }

  .answer-btn:active {
    transform: scale(0.93);
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.6);
  }

  .answer-btn.correct {
    background: rgba(46, 204, 64, 0.75) !important;
    border-color: #2ecc40 !important;
    animation: answer-glow-green 0.5s ease;
  }

  .answer-btn.wrong {
    background: rgba(255, 65, 54, 0.75) !important;
    border-color: #ff4136 !important;
    animation: answer-shake 0.4s ease;
  }

  @keyframes answer-glow-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(46,204,64,0); }
    50% { box-shadow: 0 0 30px 12px rgba(46,204,64,0.5); }
  }

  @keyframes answer-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* ── GOALKEEPER ── */
  .goalkeeper {
    position: absolute;
    bottom: -2%;
    left: 50%;
    transform: translateX(-50%);
    width: 75%;
    z-index: 11;
    image-rendering: auto;
    pointer-events: none;
  }

  /* Two stacked layers for crossfade (idle + dive) */
  .gk-layer {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    transition: opacity 0s;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.7));
  }

  .gk-layer img {
    width: 100%;
    height: auto;
    display: block;
  }

  .gk-layer.hidden { opacity: 0; }
  .gk-layer.visible { opacity: 1; }

  /* ── BALL ── */
  .ball {
    position: absolute;
    width: 40px;
    height: 40px;
    z-index: 20;
    left: 50%;
    bottom: calc(32% - 90px);
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: none;
  }

  .ball img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5));
  }

  .ball.visible { opacity: 1; }

  /* Dynamic ball animation — targets set via CSS custom properties from JS */
  .ball.shooting, .ball.missing, .ball.saved {
    transform: none;
  }
  .ball.shooting {
    animation: ball-fly 0.4s cubic-bezier(0.1, 0, 0.2, 1) forwards;
  }
  .ball.missing {
    animation: ball-miss 0.5s cubic-bezier(0.1, 0, 0.2, 1) forwards;
  }
  .ball.saved {
    animation: ball-save 0.6s cubic-bezier(0.1, 0, 0.2, 1) forwards;
  }

  @keyframes ball-fly {
    0% { left: var(--bx0); top: var(--by0); width: 40px; height: 40px; transform: none; }
    100% { left: var(--bx1); top: var(--by1); width: var(--bs1, 28px); height: var(--bs1, 28px); transform: none; }
  }

  @keyframes ball-miss {
    0% { left: var(--bx0); top: var(--by0); width: 40px; height: 40px; opacity: 1; transform: none; }
    60% { left: var(--bx1); top: var(--by1); width: 26px; height: 26px; opacity: 1; transform: none; }
    100% { left: var(--bx2); top: var(--by2); width: 18px; height: 18px; opacity: 0; transform: none; }
  }

  /* Save deflection: ball flies toward corner, then deflects hard sideways + down */
  @keyframes ball-save {
    0%   { left: var(--bx0); top: var(--by0); width: 40px; height: 40px; opacity: 1; transform: none; }
    45%  { left: var(--bx1); top: var(--by1); width: 28px; height: 28px; opacity: 1; transform: none; }
    100% { left: var(--bx2); top: var(--by2); width: 22px; height: 22px; opacity: 0.6; transform: none; }
  }

  /* Ball spin */
  .ball.spin-left img {
    animation: ball-spin-l 0.4s linear;
  }
  .ball.spin-right img {
    animation: ball-spin-r 0.4s linear;
  }

  @keyframes ball-spin-l { from { transform: rotate(0); } to { transform: rotate(-540deg); } }
  @keyframes ball-spin-r { from { transform: rotate(0); } to { transform: rotate(540deg); } }

  /* ── SCORE HUD ── */
  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
  }

  .scoreboard {
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(180deg, rgba(20,20,50,0.95), rgba(10,10,35,0.95));
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 5px 18px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }

  .team-info {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .team-flag {
    width: 22px;
    height: 22px;
    object-fit: contain;
  }

  .team-label {
    font-family: 'Russo One', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .score-display {
    font-family: 'Russo One', sans-serif;
    font-size: 26px;
    color: #ffd700;
    min-width: 26px;
    text-align: center;
  }

  .score-display.pop {
    animation: score-pop 0.3s ease;
  }

  @keyframes score-pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.5); color: #fff; }
    100% { transform: scale(1); }
  }

  .score-divider {
    color: rgba(255,255,255,0.3);
    font-size: 20px;
    font-family: 'Russo One', sans-serif;
  }

  .round-display {
    position: absolute;
    right: 14px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    font-family: 'Russo One', sans-serif;
    font-size: 13px;
    color: #ffd700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── SHOT TIMER ── */
  .timer-bar {
    width: 50px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    overflow: hidden;
  }

  .timer-fill {
    height: 100%;
    width: 100%;
    background: #ffd700;
    border-radius: 3px;
    transition: width 1s linear, background 0.3s;
    transform-origin: left;
  }

  .timer-fill.warning { background: #ff851b; }
  .timer-fill.danger { background: #ff4136; }

  /* ── TOURNAMENT PATH ── */
  .tournament-path {
    position: absolute;
    top: 80px;
    left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 12px;
    background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 80%, transparent 100%);
  }

  .path-track {
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
  }

  .path-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  .path-node {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid #fff;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Russo One', sans-serif;
    font-size: 8px;
    color: #fff;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
  }

  .path-node.trophy-node {
    background: transparent;
    border: none;
    width: 30px;
    height: 30px;
  }

  .path-node.trophy-node img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0.7;
    filter: none;
    transition: all 0.4s ease;
  }

  .path-label {
    font-family: 'Oswald', sans-serif;
    font-size: 7px;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
    white-space: nowrap;
    text-align: center;
    line-height: 1.2;
    transition: all 0.3s ease;
  }

  .path-connector {
    width: 14px;
    height: 2px;
    background: rgba(255,255,255,0.12);
    flex-shrink: 0;
    transition: background 0.4s ease;
    z-index: 1;
  }

  /* Completed step */
  .path-step.completed .path-node {
    background: linear-gradient(135deg, #1a6b2a, #2ecc40);
    border-color: #27ae60;
    color: #fff;
    box-shadow: 0 0 8px rgba(46,204,64,0.4);
  }

  .path-step.completed .path-label {
    color: rgba(46,204,64,0.8);
  }

  .path-connector.completed {
    background: linear-gradient(90deg, #2ecc40, #27ae60);
    box-shadow: 0 0 4px rgba(46,204,64,0.3);
  }

  /* Failed step */
  .path-step.failed .path-node {
    background: linear-gradient(135deg, #8b1a1a, #cc3333);
    border-color: #cc0000;
    color: #fff;
    box-shadow: 0 0 8px rgba(255,65,54,0.4);
  }

  .path-step.failed .path-label {
    color: rgba(255,65,54,0.7);
  }

  /* Current step */
  .path-step.current .path-node {
    border-color: #ffd700;
    background: rgba(255,215,0,0.15);
    color: #ffd700;
    box-shadow: 0 0 12px rgba(255,215,0,0.5);
    animation: path-pulse 1.5s ease-in-out infinite;
  }

  .path-step.current .path-label {
    color: #ffd700;
    font-weight: 700;
  }

  /* Trophy won */
  .path-step.completed .path-node.trophy-node img {
    opacity: 1;
    filter: grayscale(0%) drop-shadow(0 0 8px rgba(255,215,0,0.8));
  }

  .path-step.current .path-node.trophy-node img {
    opacity: 1;
    filter: none;
    animation: trophy-glow 1.5s ease-in-out infinite;
  }

  @keyframes path-pulse {
    0%, 100% { box-shadow: 0 0 8px rgba(255,215,0,0.3); transform: scale(1); }
    50% { box-shadow: 0 0 16px rgba(255,215,0,0.6); transform: scale(1.1); }
  }

  @keyframes trophy-glow {
    0%, 100% { filter: drop-shadow(0 0 4px rgba(255,215,0,0.3)); }
    50% { filter: drop-shadow(0 0 10px rgba(255,215,0,0.7)); }
  }

  /* ── PENALTY TRACKER ── */
  .penalty-tracker {
    position: absolute;
    top: 52px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 4px;
    padding: 5px 0 3px;
    z-index: 55;
  }

  .pen-dot {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(0,0,0,0.5);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pen-dot img {
    width: 16px;
    height: 16px;
    object-fit: contain;
  }

  .pen-dot.scored {
    background: #2ecc40;
    border-color: #27ae60;
    box-shadow: 0 0 10px rgba(46,204,64,0.6);
    transform: scale(1.1);
  }

  .pen-dot.missed {
    background: #ff4136;
    border-color: #cc0000;
    box-shadow: 0 0 10px rgba(255,65,54,0.6);
  }

  .pen-dot.current {
    border-color: #ffd700;
    box-shadow: 0 0 14px rgba(255,215,0,0.6);
    animation: dot-pulse 1s ease-in-out infinite;
  }

  .pen-dot.current img {
    width: 14px;
    height: 14px;
  }

  @keyframes dot-pulse {
    0%, 100% { box-shadow: 0 0 8px rgba(255,215,0,0.3); transform: scale(1); }
    50% { box-shadow: 0 0 18px rgba(255,215,0,0.7); transform: scale(1.15); }
  }

  /* ── QUESTION BAR ── */
  .question-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 50;
    padding: 24px 16px 20px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    background: linear-gradient(0deg, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.92) 70%, rgba(0,0,0,0.6) 90%, transparent 100%);
  }

  .question-text {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(18px, 5vw, 26px);
    color: #fff;
    text-align: center;
    line-height: 1.3;
    text-shadow: 0 2px 6px rgba(0,0,0,0.9);
  }

  .category-badge {
    display: block;
    text-align: center;
    margin-bottom: 6px;
  }

  .category-badge span {
    display: inline-block;
    background: rgba(255,215,0,0.15);
    border: 1px solid rgba(255,215,0,0.4);
    color: #ffd700;
    font-size: 10px;
    padding: 2px 12px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
  }

  /* ── RESULT OVERLAY ── */
  .result-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .result-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .result-text {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(48px, 15vw, 88px);
    text-transform: uppercase;
    letter-spacing: 6px;
    -webkit-text-stroke: 2px rgba(0,0,0,0.6);
    filter: drop-shadow(0 6px 16px rgba(0,0,0,0.6));
  }

  .result-text.goal {
    color: #2ecc40;
    text-shadow: 0 0 50px rgba(46,204,64,0.8), 0 0 100px rgba(46,204,64,0.3);
    animation: result-boom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  .result-text.saved {
    color: #ff4136;
    text-shadow: 0 0 50px rgba(255,65,54,0.8), 0 0 100px rgba(255,65,54,0.3);
    animation: result-boom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  .result-text.miss {
    color: #ff851b;
    text-shadow: 0 0 50px rgba(255,133,27,0.8), 0 0 100px rgba(255,133,27,0.3);
    animation: result-boom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  @keyframes result-boom {
    0% { transform: scale(0.1) rotate(-3deg); opacity: 0; }
    50% { transform: scale(1.2) rotate(1deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .correct-answer-reveal {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(14px, 3.5vw, 18px);
    color: rgba(255,255,255,0.8);
    margin-top: 14px;
    background: rgba(0,0,0,0.5);
    border-radius: 20px;
    padding: 6px 18px;
    backdrop-filter: blur(4px);
  }

  .correct-answer-reveal:empty { display: none; }

  /* ── CONFETTI ── */
  .confetti-container {
    position: absolute;
    inset: 0;
    z-index: 90;
    pointer-events: none;
    overflow: hidden;
  }

  .confetti {
    position: absolute;
    top: -3%;
    animation: confetti-fall linear forwards;
  }

  @keyframes confetti-fall {
    0% { top: -3%; opacity: 1; transform: rotate(0deg) translateX(0); }
    25% { transform: rotate(120deg) translateX(20px); }
    50% { transform: rotate(240deg) translateX(-15px); }
    75% { transform: rotate(330deg) translateX(10px); }
    100% { top: 105%; opacity: 0; transform: rotate(400deg) translateX(0); }
  }

  /* ── SCREEN FLASH ── */
  .screen-flash {
    position: absolute;
    inset: 0;
    z-index: 80;
    pointer-events: none;
    opacity: 0;
  }

  .screen-flash.goal-flash {
    animation: flash-green 0.5s ease-out;
  }
  .screen-flash.miss-flash {
    animation: flash-red 0.4s ease-out;
  }

  @keyframes flash-green {
    0% { opacity: 0.5; background: radial-gradient(circle, rgba(46,204,64,0.5), transparent 70%); }
    100% { opacity: 0; }
  }
  @keyframes flash-red {
    0% { opacity: 0.4; background: radial-gradient(circle, rgba(255,65,54,0.4), transparent 70%); }
    100% { opacity: 0; }
  }

  /* ── SCREEN SHAKE ── */
  #game.shake {
    animation: screen-shake 0.4s ease-out;
  }

  @keyframes screen-shake {
    0% { transform: translate(0,0); }
    15% { transform: translate(-5px, 3px); }
    30% { transform: translate(5px, -3px); }
    45% { transform: translate(-4px, -2px); }
    60% { transform: translate(3px, 2px); }
    75% { transform: translate(-2px, 1px); }
    100% { transform: translate(0,0); }
  }

  /* ── NET RIPPLE ── */
  .net-ripple {
    position: absolute;
    inset: 0;
    z-index: 6;
    pointer-events: none;
    opacity: 0;
    border-radius: 4px;
  }

  .net-ripple.active {
    animation: net-bulge 0.7s ease-out forwards;
  }

  @keyframes net-bulge {
    0% { opacity: 0; }
    20% { opacity: 1; background: radial-gradient(ellipse at var(--rx,50%) var(--ry,50%), rgba(255,255,255,0.3) 0%, transparent 50%); }
    100% { opacity: 0; }
  }

  /* ── SPLASH / TEAM SELECT ── */
  .splash-screen {
    position: absolute;
    inset: 0;
    z-index: 300;
    cursor: pointer;
    transition: opacity 0.5s;
    background: #000;
  }
  .splash-screen.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .splash-screen img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    max-width: 160%;
    max-height: 100%;
    object-fit: contain;
  }
  /* Team select is portrait — cover works fine */
  #teamSelectScreen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: static;
    transform: none;
    min-width: auto;
    min-height: auto;
    max-width: none;
    max-height: none;
  }

  /* ── START / END SCREENS ── */
  .screen-overlay {
    position: absolute;
    inset: 0;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(10px);
    transition: opacity 0.5s;
  }

  .screen-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .title-logo {
    width: 90px;
    height: 90px;
    margin-bottom: 12px;
    animation: logo-bounce 2s ease-in-out infinite;

// ── GK CROSSFADE SYSTEM ──
let gkFrontLayer = 'A';

function gkCrossfade(newSrc) {
  const frontId = gkFrontLayer;
  const backId = frontId === 'A' ? 'B' : 'A';
  const frontLayer = document.getElementById('gkLayer' + frontId);
  const backLayer = document.getElementById('gkLayer' + backId);
  const backImg = document.getElementById('gkImg' + backId);

  backImg.src = newSrc;
  frontLayer.className = 'gk-layer hidden';
  backLayer.className = 'gk-layer visible';
  gkFrontLayer = backId;
}

// ── IDLE ANIMATION (keeper2/idle1-3.png) ──
let idleInterval = null;
const IDLE_SEQ = [0, 1, 2, 1];
let idleIdx = 0;

function startIdleAnim() {
  stopIdleAnim();
  idleIdx = 0;
  gkCrossfade(IMG.idle[0]);
  idleInterval = setInterval(() => {
    idleIdx = (idleIdx + 1) % IDLE_SEQ.length;
    gkCrossfade(IMG.idle[IDLE_SEQ[idleIdx]]);
  }, 2800);
}

function stopIdleAnim() {
  if (idleInterval) { clearInterval(idleInterval); idleInterval = null; }
}

// ── DIVE ANIMATION ──
let diveTimeouts = [];

function animateGkDive(direction, isHigh) {
  stopIdleAnim();
  diveTimeouts.forEach(t => clearTimeout(t));
  diveTimeouts = [];

  // Pick the right frame sequence
  // High dive sprites: direct mapping (left=left, right=right)
  // Low dive sprites: swapped (left=diver, right=divel)
  let frames;
  if (isHigh) {
    frames = direction === 'left' ? IMG.diveLeftHigh : IMG.diveRightHigh;
  } else {
    frames = direction === 'left' ? IMG.diveRightLow : IMG.diveLeftLow;
  }

  // No CSS fly/flip needed — movement is baked into the sprites
  gk.className = 'goalkeeper';

  // Play frames with even timing across ~600ms
  const interval = Math.floor(600 / frames.length);
  frames.forEach((src, i) => {
    if (i === 0) {
      gkCrossfade(src);
    } else {
      diveTimeouts.push(setTimeout(() => gkCrossfade(src), i * interval));
    }
  });
}

// Reset GK to standing idle
function resetGk() {
  diveTimeouts.forEach(t => clearTimeout(t));
  diveTimeouts = [];
  gk.className = 'goalkeeper idle';
  const layerA = document.getElementById('gkLayerA');
  const layerB = document.getElementById('gkLayerB');
  layerA.className = 'gk-layer hidden';
  layerB.className = 'gk-layer hidden';

// Calculate ball target position based on answer button location
function getBallTarget(btnIdx) {
  const btn = answersContainer.querySelectorAll('.answer-btn')[btnIdx];
  const btnRect = btn.getBoundingClientRect();
  const gameRect = gameEl.getBoundingClientRect();
  // Target: center of the answer button, relative to game container
  const targetX = btnRect.left + btnRect.width / 2 - gameRect.left;
  const targetY = btnRect.top + btnRect.height / 2 - gameRect.top;
  return { x: targetX, y: targetY };
}

// Set ball CSS vars for dynamic animation
function shootBallTo(targetX, targetY) {
  const gameRect = gameEl.getBoundingClientRect();
  const ballRect = ball.getBoundingClientRect();
  const startX = ballRect.left + ballRect.width / 2 - gameRect.left;
  const startY = ballRect.top + ballRect.height / 2 - gameRect.top;

  ball.style.setProperty('--bx0', startX + 'px');
  ball.style.setProperty('--by0', startY + 'px');
  ball.style.setProperty('--bx1', targetX + 'px');
  ball.style.setProperty('--by1', targetY + 'px');
  ball.style.setProperty('--bs1', '28px');

  const isLeft = targetX < gameRect.width / 2;
  ball.className = `ball visible shooting ${isLeft ? 'spin-left' : 'spin-right'}`;
}

// Save: ball flies to corner then deflects hard sideways + down
function shootBallSave(targetX, targetY) {
  const gameRect = gameEl.getBoundingClientRect();
  const ballRect = ball.getBoundingClientRect();
  const startX = ballRect.left + ballRect.width / 2 - gameRect.left;
  const startY = ballRect.top + ballRect.height / 2 - gameRect.top;

  ball.style.setProperty('--bx0', startX + 'px');
  ball.style.setProperty('--by0', startY + 'px');

  // Mid-point: where keeper contacts ball
  ball.style.setProperty('--bx1', targetX + 'px');
  ball.style.setProperty('--by1', targetY + 'px');

  // Deflection: hard turn left+down or right+down depending on which side
  const isLeftSide = targetX < gameRect.width / 2;
  const deflectX = isLeftSide ? -40 : gameRect.width + 40;
  const deflectY = gameRect.height * 0.75;

  ball.style.setProperty('--bx2', deflectX + 'px');
  ball.style.setProperty('--by2', deflectY + 'px');

  ball.className = `ball visible saved ${isLeftSide ? 'spin-left' : 'spin-right'}`;
}

function shootBallMiss() {
  const gameRect = gameEl.getBoundingClientRect();
  const ballRect = ball.getBoundingClientRect();
  const startX = ballRect.left + ballRect.width / 2 - gameRect.left;
  const startY = ballRect.top + ballRect.height / 2 - gameRect.top;

  ball.style.setProperty('--bx0', startX + 'px');
  ball.style.setProperty('--by0', startY + 'px');

  // Random miss direction
  const missDir = Math.random();
  let midX, midY, endX, endY;
  if (missDir < 0.33) {
    // Miss left
    midX = gameRect.width * 0.05; midY = gameRect.height * 0.35;
    endX = -30; endY = gameRect.height * 0.3;
  } else if (missDir < 0.66) {
    // Miss right
    midX = gameRect.width * 0.95; midY = gameRect.height * 0.35;
    endX = gameRect.width + 30; endY = gameRect.height * 0.3;
  } else {
    // Miss over
    midX = gameRect.width * 0.48; midY = gameRect.height * 0.08;
    endX = gameRect.width * 0.47; endY = -20;
  }

  ball.style.setProperty('--bx1', midX + 'px');
  ball.style.setProperty('--by1', midY + 'px');
  ball.style.setProperty('--bx2', endX + 'px');
  ball.style.setProperty('--by2', endY + 'px');

  const isLeft = missDir < 0.33;
  ball.className = `ball visible missing ${isLeft ? 'spin-left' : 'spin-right'}`;
}

let currentBgAudio = null; // track which background audio is playing

function fadeAudio(audio, fromVol, toVol, duration, callback) {
  const steps = 20;
  const stepTime = duration / steps;
  const volStep = (toVol - fromVol) / steps;
  let step = 0;
  audio.volume = fromVol;
  const interval = setInterval(() => {
    step++;
    audio.volume = Math.min(1, Math.max(0, fromVol + volStep * step));
    if (step >= steps) {
      clearInterval(interval);
      audio.volume = toVol;
      if (callback) callback();
    }
  }, stepTime);
  return interval;
}

function switchToCrowd() {
  if (currentBgAudio === crowdAudio) return;
  if (currentBgAudio === songAudio) {
    fadeAudio(songAudio, songAudio.volume, 0, 1000, () => { songAudio.pause(); });
  }
  crowdAudio.currentTime = 0;
  crowdAudio.play().catch(() => {});
  fadeAudio(crowdAudio, 0, 0.4, 1500);
  currentBgAudio = crowdAudio;
}

function switchToSong() {
  if (currentBgAudio === songAudio) return;
  if (currentBgAudio === crowdAudio) {
    fadeAudio(crowdAudio, crowdAudio.volume, 0, 1000, () => { crowdAudio.pause(); });
  }
  songAudio.currentTime = 0;
  songAudio.play().catch(() => {});
  fadeAudio(songAudio, 0, 0.5, 1500);
  currentBgAudio = songAudio;
}

function playKick() {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'triangle'; o.frequency.setValueAtTime(150, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.12);
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.15);
}

function playCheer() {
  playGoalSound();
}

function playMissSound() {
  playMissSfx();
}

function playWhistle() {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(800, audioCtx.currentTime);
  o.frequency.setValueAtTime(900, audioCtx.currentTime + 0.15);
  o.frequency.setValueAtTime(800, audioCtx.currentTime + 0.3);
  g.gain.setValueAtTime(0.1, audioCtx.currentTime);
  g.gain.setValueAtTime(0.1, audioCtx.currentTime + 0.25);
  g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
  o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.4);
}

// ── QUESTIONS ──
let usedQuestionIndices = new Set();

function getDifficultyForStage(stage) {
  // Stages 0-2 (Group) = easy, 3-4 (R32/R16) = medium, 5-7 (QF/SF/Final) = hard
  if (stage <= 2) return 1;
  if (stage <= 4) return 2;
  return 3;
}

function pickQuestions() {
  const diff = getDifficultyForStage(state.tournamentStage);
  // Get questions of this difficulty that haven't been used
  let pool = QUESTIONS
    .map((q, i) => ({ ...q, _idx: i }))
    .filter(q => q.d === diff && !usedQuestionIndices.has(q._idx));

  // If not enough, also pull from adjacent difficulty
  if (pool.length < state.maxRounds) {
    const adjacent = diff === 1 ? 2 : diff === 3 ? 2 : (Math.random() > 0.5 ? 1 : 3);
    const extra = QUESTIONS
      .map((q, i) => ({ ...q, _idx: i }))
      .filter(q => q.d === adjacent && !usedQuestionIndices.has(q._idx));
    pool = pool.concat(extra);
  }

  // If still not enough, reset used questions for this difficulty
  if (pool.length < state.maxRounds) {
    usedQuestionIndices = new Set();
    pool = QUESTIONS.map((q, i) => ({ ...q, _idx: i })).filter(q => q.d === diff);
  }

  // Shuffle and pick
  pool.sort(() => Math.random() - 0.5);
  state.questions = pool.slice(0, state.maxRounds);
  // Mark as used
  state.questions.forEach(q => usedQuestionIndices.add(q._idx));
}

function showQuestion() {
  const q = state.questions[state.round];
  categoryBadge.textContent = q.cat;
  questionText.textContent = q.q;
  updatePointsDisplay();

  answersContainer.innerHTML = '';
  q.a.forEach((ans, idx) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = ans;
    btn.addEventListener('click', () => selectAnswer(idx));
    btn.style.opacity = '0'; btn.style.transform = 'scale(0.85)';
    setTimeout(() => { btn.style.transition = 'opacity 0.2s, transform 0.2s'; btn.style.opacity = '1'; btn.style.transform = 'scale(1)'; }, 100 + idx * 70);
    answersContainer.appendChild(btn);
  });

  // Reset
  ball.className = 'ball visible';
  ball.style.removeProperty('--bx0');
  ball.style.removeProperty('--by0');
  ball.style.removeProperty('--bx1');
  ball.style.removeProperty('--by1');
  ball.style.removeProperty('--bx2');
  ball.style.removeProperty('--by2');
  ball.style.removeProperty('--bs1');
  resetGk();
  netRipple.className = 'net-ripple';
  screenFlash.className = 'screen-flash';
  resultOverlay.className = 'result-overlay';
  confettiContainer.innerHTML = '';
  state.locked = false;
  startShotTimer();
}

// ── ANSWER ──
function selectAnswer(idx) {
  if (state.locked) return;
  state.locked = true;
  stopShotTimer();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  playKick();

  const q = state.questions[state.round];
  const isCorrect = idx === q.correct;
  const buttons = answersContainer.querySelectorAll('.answer-btn');

  buttons[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) buttons[q.correct].classList.add('correct');
  buttons.forEach(b => b.style.pointerEvents = 'none');

  setTimeout(playKick, 180);

  const isHigh = idx < 2; // top row = high dive, bottom row = low dive

  if (isCorrect) {
    // GOAL: Ball goes to the selected answer square, GK dives the WRONG way
    const wrongDir = CORNER_DIR[idx] === 'left' ? 'right' : 'left';
    const wrongHigh = Math.random() > 0.5;
    const target = getBallTarget(idx);

    setTimeout(() => {
      shootBallTo(target.x, target.y);
      animateGkDive(wrongDir, wrongHigh);
    }, 250);

    setTimeout(() => triggerGoal(idx), 750);
  } else {
    // SAVE: GK dives to the correct square and saves it, ball deflects hard sideways + down
    const target = getBallTarget(idx);

    setTimeout(() => {
      shootBallSave(target.x, target.y);
      animateGkDive(CORNER_DIR[idx], isHigh);
    }, 250);
    setTimeout(() => triggerSave(), 750);
  }
}

function triggerGoal(corner) {
  const pos = CORNER_RIPPLE[corner].split(' ');
  netRipple.style.setProperty('--rx', pos[0]);
  netRipple.style.setProperty('--ry', pos[1]);
  netRipple.className = 'net-ripple active';
  screenFlash.className = 'screen-flash goal-flash';
  playCheer();
  spawnConfetti();

  const pts = getPointsForShot();
  state.totalPoints += pts;

  resultText.className = 'result-text goal';
  resultText.textContent = 'GOAL!';
  correctReveal.textContent = `+${pts} pts`;
  resultOverlay.className = 'result-overlay active';

  state.playerScore++;
  state.results.push(true);
  const el = $('playerScore'); el.textContent = state.playerScore;
  el.classList.add('pop'); setTimeout(() => el.classList.remove('pop'), 400);

  applyOppScore();

  updatePointsDisplay();
  updateTracker();
  setTimeout(nextRound, 2200);
}

// Check if opponent scores this round (pre-determined schedule)
function oppScoresThisRound() {
  if (state.suddenDeath) return true; // In sudden death, opponent always scores
  return state.oppScoreRounds && state.oppScoreRounds.has(state.round);
}

function applyOppScore() {
  if (oppScoresThisRound()) {
    state.oppScore++;
    const el = $('oppScore'); el.textContent = state.oppScore;
    el.classList.add('pop'); setTimeout(() => el.classList.remove('pop'), 400);
  }
}

function triggerSave() {
  screenFlash.className = 'screen-flash miss-flash';
  gameEl.classList.add('shake'); setTimeout(() => gameEl.classList.remove('shake'), 500);
  playMissSound();

  resultText.className = 'result-text saved';
  resultText.textContent = 'SAVED!';
  const q = state.questions[state.round];
  correctReveal.textContent = `Answer: ${q.a[q.correct]}`;
  resultOverlay.className = 'result-overlay active';

  applyOppScore();

  state.results.push(false);
  updateTracker();
  setTimeout(nextRound, 2400);
}

function triggerMiss() {
  screenFlash.className = 'screen-flash miss-flash';
  gameEl.classList.add('shake'); setTimeout(() => gameEl.classList.remove('shake'), 500);
  playMissSound();

  resultText.className = 'result-text miss';
  resultText.textContent = 'MISS!';
  const q = state.questions[state.round];
  correctReveal.textContent = `Answer: ${q.a[q.correct]}`;
  resultOverlay.className = 'result-overlay active';

  applyOppScore();

  state.results.push(false);
  updateTracker();
  setTimeout(nextRound, 2400);
}

function spawnConfetti() {
  const colors = ['#ffd700','#2ecc40','#ff4136','#0074d9','#ff851b','#f012be','#fff','#01ff70'];
  for (let i = 0; i < 55; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = (8 + Math.random() * 84) + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 0.5 + 's';
    c.style.animationDuration = (1.2 + Math.random() * 1) + 's';
    const s = 5 + Math.random() * 8;
    c.style.width = s + 'px';
    c.style.height = (s * (0.4 + Math.random() * 0.8)) + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    confettiContainer.appendChild(c);
  }
}

function nextRound() {
  state.round++;
  if (state.round >= state.maxRounds) { endGame(); return; }
  showQuestion();
  updateTracker();
}

function endGame() {
  const draw = state.playerScore === state.oppScore;

  // Sudden death on draw: one more question — score = win, miss = lose
  if (draw && !state.suddenDeath) {
    state.suddenDeath = true;
    state.maxRounds = state.round + 1; // one more round
    // Pick one extra question
    const diff = state.tournamentStage < 3 ? 1 : state.tournamentStage < 6 ? 2 : 3;
    const pool = QUESTIONS.filter((q, i) => q.d === diff && !usedQuestionIndices.has(i));
    if (pool.length > 0) {
      const pick = pool[Math.floor(Math.random() * pool.length)];
      state.questions.push(pick);
    } else {
      const fallback = QUESTIONS.filter((q, i) => !usedQuestionIndices.has(i));
      state.questions.push(fallback[Math.floor(Math.random() * fallback.length)] || QUESTIONS[0]);
    }

    resultText.className = 'result-text goal';
    resultText.textContent = 'SUDDEN DEATH!';
    correctReveal.textContent = 'Next goal wins...';
    resultOverlay.className = 'result-overlay active';
    setTimeout(() => {
      showQuestion();
      updateTracker();
    }, 2000);
    return;
  }

  state.phase = 'ended';
  playWhistle();

  const won = state.playerScore > state.oppScore;
  state.tournamentResults.push(won);

  stopShotTimer();
  $('finalScore').textContent = `${state.playerScore} - ${state.oppScore}`;

  const stageName = TOURNAMENT[state.tournamentStage].label;
  const isLastStage = state.tournamentStage >= TOURNAMENT.length - 1;

  // Reset end screen background
  const endEl = $('endScreen');
  endEl.style.background = 'rgba(0,0,0,0.88)';
  endEl.style.backgroundSize = '';
  endEl.style.backgroundPosition = '';

  if (won && isLastStage) {
    // Won the final!
    $('endImg').src = 'world-cup.png';
    $('endImg').style.display = '';
    $('endTitle').textContent = 'WORLD CHAMPION!';
    $('finalMessage').textContent = 'You lifted the World Cup trophy!';
    $('restartBtn').textContent = 'PLAY AGAIN';
    setTimeout(() => { for (let i = 0; i < 4; i++) setTimeout(spawnConfetti, i * 250); }, 400);
  } else if (won || draw) {
    // Won or drew — advance
    const nextStage = TOURNAMENT[state.tournamentStage + 1];
    $('endImg').src = IMG.trophy;
    $('endImg').style.display = '';
    $('endTitle').textContent = draw ? 'DRAW!' : 'YOU WIN!';
    $('finalMessage').textContent = `You advance to the ${nextStage.label}!`;
    $('restartBtn').textContent = 'NEXT MATCH';
    if (won) setTimeout(() => { for (let i = 0; i < 2; i++) setTimeout(spawnConfetti, i * 200); }, 400);
  } else {
    // Lost — eliminated: use Empty.png as full background
    $('endImg').style.display = 'none';
    endEl.style.background = 'url("Empty.png") center center / cover no-repeat';
    $('endTitle').textContent = 'ELIMINATED';
    $('finalMessage').textContent = `Knocked out in the ${stageName}...`;
    $('restartBtn').textContent = 'TRY AGAIN';
    switchToSong();
  }

  $('endScreen').classList.remove('hidden');
  updateTracker();
  updateTournamentPath();
}

function advanceOrReset() {
  const lastResult = state.tournamentResults[state.tournamentStage];
  if (lastResult && state.tournamentStage < TOURNAMENT.length - 1) {
    // Advance to next stage
    state.tournamentStage++;
    startStage();
  } else {
    // Lost or won final — full reset
    resetTournament();
  }
}

function startStage() {
  state.round = 0;
  state.playerScore = 0;
  state.oppScore = 0;
  state.results = [];
  state.questions = [];
  state.locked = false;
  state.phase = 'playing';
  state.suddenDeath = false;

  // Pre-determine which rounds the opponent scores on
  // Group games: opponent scores 3 out of 5, knockout: 4 out of 5
  const isGroup = state.tournamentStage < 3;
  const isSemiOrFinal = state.tournamentStage >= 6; // SF=6, Final=7
  const oppGoals = isGroup ? 3 : isSemiOrFinal ? 5 : 4;
  const rounds = [0, 1, 2, 3, 4];
  rounds.sort(() => Math.random() - 0.5);
  state.oppScoreRounds = new Set(rounds.slice(0, oppGoals));

  $('playerScore').textContent = '0';
  $('oppScore').textContent = '0';
  $('endScreen').classList.add('hidden');
  confettiContainer.innerHTML = '';
  switchToCrowd();
  updateScoreboard();
  resetGk();
  pickQuestions(); showQuestion(); updateTracker(); updateTournamentPath();
}

function resetTournament() {
  const team = state.team || 'England';
  state = { round: 0, maxRounds: 5, playerScore: 0, oppScore: 0, results: [], questions: [], locked: false, phase: 'playing', tournamentStage: 0, tournamentResults: [], totalPoints: 0, team, suddenDeath: false, oppScoreRounds: new Set() };
  usedQuestionIndices = new Set();
  $('playerScore').textContent = '0';
  $('oppScore').textContent = '0';
  $('endScreen').classList.add('hidden');
  confettiContainer.innerHTML = '';
  switchToCrowd();
  updateScoreboard();
  pickQuestions(); showQuestion(); updateTracker(); updateTournamentPath();
}

// ── INIT ──
updateTracker();
updateTournamentPath();

// Splash — first tap starts music, second tap goes to team select
let splashMusicStarted = false;
$('splashScreen').addEventListener('click', () => {
  if (!splashMusicStarted) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    startSong();
    splashMusicStarted = true;
    return;
  }
  $('splashScreen').classList.add('hidden');
  $('teamSelectScreen').classList.remove('hidden');
});

// Team Select — top half = England, bottom half = Brazil
$('teamSelectScreen').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const clickY = e.clientY - rect.top;
  const isTopHalf = clickY < rect.height / 2;

  state.team = isTopHalf ? 'England' : 'Brazil';
  document.querySelector('.team-label').textContent = state.team.substring(0, 3).toUpperCase();

  $('teamSelectScreen').classList.add('hidden');
  if (audioCtx.state === 'suspended') audioCtx.resume();
  switchToCrowd();
  playWhistle();
  state.phase = 'playing';
  state.suddenDeath = false;

  // Pre-determine opponent goals (group = 3, knockout = 4)
  const isGroup = state.tournamentStage < 3;
  const isSemiOrFinal = state.tournamentStage >= 6; // SF=6, Final=7
  const oppGoals = isGroup ? 3 : isSemiOrFinal ? 5 : 4;
  const rounds = [0, 1, 2, 3, 4];
  rounds.sort(() => Math.random() - 0.5);
  state.oppScoreRounds = new Set(rounds.slice(0, oppGoals));

  updateScoreboard();
  resetGk();
  pickQuestions(); showQuestion(); updateTracker(); updateTournamentPath();
});

$('restartBtn').addEventListener('click', advanceOrReset);

</script>
</body>
</html>
